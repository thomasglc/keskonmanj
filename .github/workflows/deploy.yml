name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Export static site
        run: npx expo export -p web
        env:
          EXPO_PUBLIC_DIRECTUS_URL: ${{ secrets.DIRECTUS_URL }}

      - name: Debug dist structure
        run: |
          echo "=== dist root ===" && ls dist/
          echo "=== manifest ===" && cat dist/manifest.json 2>/dev/null || echo "no manifest.json"
          echo "=== index.html head ===" && head -30 dist/index.html 2>/dev/null || echo "no index.html"

      - name: Patch manifest for PWA standalone mode
        run: |
          node -e "
            const fs = require('fs');
            const path = 'dist/manifest.json';
            let m = fs.existsSync(path) ? JSON.parse(fs.readFileSync(path, 'utf8')) : {};
            m.name = m.name || 'Kèskonmanj';
            m.short_name = m.short_name || 'Kèskonmanj';
            m.display = 'standalone';
            m.start_url = '/';
            m.orientation = 'portrait';
            m.background_color = m.background_color || '#ffffff';
            m.theme_color = m.theme_color || '#ffffff';
            m.icons = [{ src: '/assets/icon.png', sizes: '512x512', type: 'image/png' }];
            fs.writeFileSync(path, JSON.stringify(m, null, 2));
            console.log('Manifest:', JSON.stringify(m, null, 2));
          "

      - name: Add .nojekyll
        run: touch dist/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
